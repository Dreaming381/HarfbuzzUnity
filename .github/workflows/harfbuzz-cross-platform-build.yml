name: harfbuzz-cross-platform-build

on:
  push:
    branches:
      - '**'
    paths-ignore:
      - docs/**
      - '**/*.md'

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - name: Git checkout
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Setup meson
        run: python -m pip install meson ninja
      - name: Build libpng and zlib for Linux x86_64
        run: |
          git clone --depth 1 https://github.com/glennrp/libpng.git libpng
          cmake -S libpng -B libpng/build_linux_x86_64 \
            -G "Ninja" \
            -DCMAKE_BUILD_TYPE=MinSizeRel \
            -DCMAKE_INSTALL_PREFIX=libpng/install_linux_x86_64 \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DPNG_SHARED=OFF \
            -DPNG_TESTS=OFF
          cmake --build libpng/build_linux_x86_64
          cmake --install libpng/build_linux_x86_64
          git clone --depth 1 https://github.com/madler/zlib.git zlib
          cmake -S zlib -B zlib/build_linux_x86_64 \
            -G "Ninja" \
            -DCMAKE_BUILD_TYPE=MinSizeRel \
            -DCMAKE_INSTALL_PREFIX=zlib/install_linux_x86_64 \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DBUILD_SHARED_LIBS=OFF
          cmake --build zlib/build_linux_x86_64
          cmake --install zlib/build_linux_x86_64
      - name: Build Linux x86_64
        run: |
          cd harfbuzz
          meson setup build \
            --buildtype=minsize \
            --pkg-config-path=../libpng/install_linux_x86_64/lib/pkgconfig:../zlib/install_linux_x86_64/lib/pkgconfig \
            -Dtests=disabled -Dutilities=disabled -Db_lto=true \
            -Dfreetype=disabled -Dglib=disabled -Dcairo=disabled \
            -Dicu=disabled -Dgobject=disabled -Dchafa=disabled \
            -Ddefault_library=shared \
            -Dc_link_args='-static-libgcc' \
            -Dcpp_link_args='-static-libgcc -static-libstdc++'
          meson compile -C build
          objcopy --only-keep-debug build/src/libharfbuzz.so build/src/libharfbuzz.so.debug
          strip --strip-debug build/src/libharfbuzz.so
          objcopy --add-gnu-debuglink=build/src/libharfbuzz.so.debug build/src/libharfbuzz.so
          objcopy --only-keep-debug build/src/libharfbuzz-subset.so build/src/libharfbuzz-subset.so.debug
          strip --strip-debug build/src/libharfbuzz-subset.so
          objcopy --add-gnu-debuglink=build/src/libharfbuzz-subset.so.debug build/src/libharfbuzz-subset.so
          objcopy --only-keep-debug build/src/libharfbuzz-raster.so build/src/libharfbuzz-raster.so.debug
          strip --strip-debug build/src/libharfbuzz-raster.so
          objcopy --add-gnu-debuglink=build/src/libharfbuzz-raster.so.debug build/src/libharfbuzz-raster.so
          objcopy --only-keep-debug build/src/libharfbuzz-vector.so build/src/libharfbuzz-vector.so.debug
          strip --strip-debug build/src/libharfbuzz-vector.so
          objcopy --add-gnu-debuglink=build/src/libharfbuzz-vector.so.debug build/src/libharfbuzz-vector.so
          cd ..
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v6
        with:
          name: linux-artifacts
          path: |
            ./harfbuzz/build/src/*.so
            ./harfbuzz/build/src/*.so.debug

  android:
    runs-on: ubuntu-24.04
    steps:
      - name: Git checkout
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Set up NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27d
      - name: Setup meson
        run: python -m pip install meson ninja
      - name: Generate Android Cross Files
        run: |
          envsubst < android_arm64_crossfile_device.txt.template > android_arm64_crossfile_device.txt
          envsubst < android_arm32_crossfile_device.txt.template > android_arm32_crossfile_device.txt
      - name: Build libpng and zlib for Android
        run: |
          git clone --depth 1 https://github.com/glennrp/libpng.git libpng
          git clone --depth 1 https://github.com/madler/zlib.git zlib

          # ARM64
          cmake -S libpng -B libpng/build_android_arm64 \
            -G "Ninja" \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-35 \
            -DCMAKE_BUILD_TYPE=MinSizeRel \
            -DCMAKE_INSTALL_PREFIX=libpng/install_android_arm64 \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DPNG_SHARED=OFF \
            -DPNG_TESTS=OFF
          cmake --build libpng/build_android_arm64
          cmake --install libpng/build_android_arm64
          cmake -S zlib -B zlib/build_android_arm64 \
            -G "Ninja" \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-35 \
            -DCMAKE_BUILD_TYPE=MinSizeRel \
            -DCMAKE_INSTALL_PREFIX=zlib/install_android_arm64 \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DBUILD_SHARED_LIBS=OFF
          cmake --build zlib/build_android_arm64
          cmake --install zlib/build_android_arm64

          # ARM32
          cmake -S libpng -B libpng/build_android_arm32 \
            -G "Ninja" \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=armeabi-v7a \
            -DANDROID_PLATFORM=android-35 \
            -DCMAKE_BUILD_TYPE=MinSizeRel \
            -DCMAKE_INSTALL_PREFIX=libpng/install_android_arm32 \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DPNG_SHARED=OFF \
            -DPNG_TESTS=OFF
          cmake --build libpng/build_android_arm32
          cmake --install libpng/build_android_arm32
          cmake -S zlib -B zlib/build_android_arm32 \
            -G "Ninja" \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=armeabi-v7a \
            -DANDROID_PLATFORM=android-35 \
            -DCMAKE_BUILD_TYPE=MinSizeRel \
            -DCMAKE_INSTALL_PREFIX=zlib/install_android_arm32 \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DBUILD_SHARED_LIBS=OFF
          cmake --build zlib/build_android_arm32
          cmake --install zlib/build_android_arm32
      - name: Build Android ARM64
        run: |
          cd harfbuzz
          meson setup build_android_arm64 \
            --cross-file ../android_arm64_crossfile_device.txt \
            --buildtype=minsize \
            --pkg-config-path=../libpng/install_android_arm64/lib/pkgconfig:../zlib/install_android_arm64/lib/pkgconfig \
            -Dtests=disabled -Dutilities=disabled -Db_lto=true \
            -Dfreetype=disabled -Dglib=disabled -Dcairo=disabled \
            -Dicu=disabled -Dgobject=disabled -Dchafa=disabled
          meson compile -C build_android_arm64
          cd build_android_arm64
          ANDROID_NDK="$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/"
          "$ANDROID_NDK/llvm-objcopy" --only-keep-debug src/libharfbuzz.so src/libharfbuzz.so.debug
          "$ANDROID_NDK/llvm-strip" --strip-debug src/libharfbuzz.so
          "$ANDROID_NDK/llvm-objcopy" --add-gnu-debuglink=src/libharfbuzz.so.debug src/libharfbuzz.so
          "$ANDROID_NDK/llvm-objcopy" --only-keep-debug src/libharfbuzz-subset.so src/libharfbuzz-subset.so.debug
          "$ANDROID_NDK/llvm-strip" --strip-debug src/libharfbuzz-subset.so
          "$ANDROID_NDK/llvm-objcopy" --add-gnu-debuglink=src/libharfbuzz-subset.so.debug src/libharfbuzz-subset.so
          "$ANDROID_NDK/llvm-objcopy" --only-keep-debug src/libharfbuzz-raster.so src/libharfbuzz-raster.so.debug
          "$ANDROID_NDK/llvm-strip" --strip-debug src/libharfbuzz-raster.so
          "$ANDROID_NDK/llvm-objcopy" --add-gnu-debuglink=src/libharfbuzz-raster.so.debug src/libharfbuzz-raster.so
          "$ANDROID_NDK/llvm-objcopy" --only-keep-debug src/libharfbuzz-vector.so src/libharfbuzz-vector.so.debug
          "$ANDROID_NDK/llvm-strip" --strip-debug src/libharfbuzz-vector.so
          "$ANDROID_NDK/llvm-objcopy" --add-gnu-debuglink=src/libharfbuzz-vector.so.debug src/libharfbuzz-vector.so
          cd ../..
      - name: Build Android ARM32
        run: |
          cd harfbuzz
          meson setup build_android_arm32 \
            --cross-file ../android_arm32_crossfile_device.txt \
            --buildtype=minsize \
            --pkg-config-path=../libpng/install_android_arm32/lib/pkgconfig:../zlib/install_android_arm32/lib/pkgconfig \
            -Dtests=disabled -Dutilities=disabled -Db_lto=true \
            -Dfreetype=disabled -Dglib=disabled -Dcairo=disabled \
            -Dicu=disabled -Dgobject=disabled -Dchafa=disabled
          meson compile -C build_android_arm32
          cd build_android_arm32
          NDK_BIN="$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/"
          "$NDK_BIN/llvm-objcopy" --only-keep-debug src/libharfbuzz.so src/libharfbuzz.so.debug
          "$NDK_BIN/llvm-strip" --strip-debug src/libharfbuzz.so
          "$NDK_BIN/llvm-objcopy" --add-gnu-debuglink=src/libharfbuzz.so.debug src/libharfbuzz.so
          "$NDK_BIN/llvm-objcopy" --only-keep-debug src/libharfbuzz-subset.so src/libharfbuzz-subset.so.debug
          "$NDK_BIN/llvm-strip" --strip-debug src/libharfbuzz-subset.so
          "$NDK_BIN/llvm-objcopy" --add-gnu-debuglink=src/libharfbuzz-subset.so.debug src/libharfbuzz-subset.so
          "$NDK_BIN/llvm-objcopy" --only-keep-debug src/libharfbuzz-raster.so src/libharfbuzz-raster.so.debug
          "$NDK_BIN/llvm-strip" --strip-debug src/libharfbuzz-raster.so
          "$NDK_BIN/llvm-objcopy" --add-gnu-debuglink=src/libharfbuzz-raster.so.debug src/libharfbuzz-raster.so
          "$NDK_BIN/llvm-objcopy" --only-keep-debug src/libharfbuzz-vector.so src/libharfbuzz-vector.so.debug
          "$NDK_BIN/llvm-strip" --strip-debug src/libharfbuzz-vector.so
          "$NDK_BIN/llvm-objcopy" --add-gnu-debuglink=src/libharfbuzz-vector.so.debug src/libharfbuzz-vector.so
          cd ../..
      - name: Upload Android ARM64 artifacts
        uses: actions/upload-artifact@v6
        with:
          name: android-arm64-artifacts
          path: |
            ./harfbuzz/build_android_arm64/src/*.so
            ./harfbuzz/build_android_arm64/src/*.so.debug
            ./libpng/install_android_arm64/lib/*.a
            ./zlib/install_android_arm64/lib/*.a
      - name: Upload Android ARM32 artifacts
        uses: actions/upload-artifact@v6
        with:
          name: android-arm32-artifacts
          path: |
            ./harfbuzz/build_android_arm32/src/*.so
            ./harfbuzz/build_android_arm32/src/*.so.debug
            ./libpng/install_android_arm32/lib/*.a
            ./zlib/install_android_arm32/lib/*.a

  windows:
    runs-on: windows-2025
    steps:
      - name: Git checkout
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Setup meson
        run: python -m pip install meson ninja
      - name: Install libpng and zlib
        run: vcpkg install libpng:x64-windows zlib:x64-windows
      - name: Install pkg-config
        run: choco install pkgconfiglite -y
      - name: Build windows x86_64
        run: |
          cd harfbuzz
          meson setup build `
            --vsenv `
            --buildtype=minsize `
            --pkg-config-path="$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\lib\pkgconfig" `
            -Dtests=disabled -Dutilities=disabled -Db_lto=true `
            -Dfreetype=disabled -Dglib=disabled -Dcairo=disabled `
            -Dicu=disabled -Dgobject=disabled -Dchafa=disabled
          meson compile -C build
          cd ..
      - name: Copy vcpkg libs to build output
        run: |
          copy "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin\libpng16.dll" harfbuzz\build\src\
          copy "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin\zlib1.dll" harfbuzz\build\src\
          copy "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\lib\libpng16.lib" harfbuzz\build\src\
          copy "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\lib\zlib.lib" harfbuzz\build\src\
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v6
        with:
          name: windows-artifacts
          path: |
            ./harfbuzz/build/src/*.dll
            ./harfbuzz/build/src/*.pdb
            ./harfbuzz/build/src/*.lib

  android-x86_64:
    runs-on: windows-2025
    steps:
      - name: Git checkout
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Set up NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27d
      - name: Setup meson
        run: python -m pip install meson ninja
      - name: Generate Android Cross File
        run: (Get-Content android_x86_64_crossfile_device.txt.template).Replace('${ANDROID_NDK_ROOT}', $env:ANDROID_NDK_ROOT) | Set-Content android_x86_64_crossfile_device.txt
      - name: Build libpng and zlib for Android x86_64
        run: |
          git clone --depth 1 https://github.com/glennrp/libpng.git libpng
          git clone --depth 1 https://github.com/madler/zlib.git zlib
          cmake -S libpng -B libpng/build_android_x86_64 `
            -G "Ninja" `
            -DCMAKE_TOOLCHAIN_FILE="$env:ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake" `
            -DANDROID_ABI=x86_64 `
            -DANDROID_PLATFORM=android-35 `
            -DCMAKE_BUILD_TYPE=MinSizeRel `
            -DCMAKE_INSTALL_PREFIX=libpng/install_android_x86_64 `
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON `
            -DPNG_SHARED=OFF `
            -DPNG_TESTS=OFF
          cmake --build libpng/build_android_x86_64
          cmake --install libpng/build_android_x86_64
          cmake -S zlib -B zlib/build_android_x86_64 `
            -G "Ninja" `
            -DCMAKE_TOOLCHAIN_FILE="$env:ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake" `
            -DANDROID_ABI=x86_64 `
            -DANDROID_PLATFORM=android-35 `
            -DCMAKE_BUILD_TYPE=MinSizeRel `
            -DCMAKE_INSTALL_PREFIX=zlib/install_android_x86_64 `
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON `
            -DBUILD_SHARED_LIBS=OFF
          cmake --build zlib/build_android_x86_64
          cmake --install zlib/build_android_x86_64
      - name: Build Android x86_64
        run: |
          cd harfbuzz
          meson setup build_android_x86_64 `
            --cross-file ../android_x86_64_crossfile_device.txt `
            --buildtype=minsize `
            --pkg-config-path="..\libpng\install_android_x86_64\lib\pkgconfig;..\zlib\install_android_x86_64\lib\pkgconfig" `
            -Dtests=disabled -Dutilities=disabled -Db_lto=true `
            -Dfreetype=disabled -Dglib=disabled -Dcairo=disabled `
            -Dicu=disabled -Dgobject=disabled -Dchafa=disabled
          meson compile -C build_android_x86_64
          cd build_android_x86_64
          $NDK_BIN = Join-Path -Path $env:ANDROID_NDK_ROOT -ChildPath "/toolchains/llvm/prebuilt/windows-x86_64/bin"
          $NDK_OBJCOPY = Join-Path -Path $NDK_BIN -ChildPath "llvm-objcopy.exe"
          $NDK_STRIP = Join-Path -Path $NDK_BIN -ChildPath "llvm-strip.exe"
          & "$NDK_OBJCOPY" --only-keep-debug src/libharfbuzz.so src/libharfbuzz.so.debug
          & "$NDK_STRIP" --strip-debug src/libharfbuzz.so
          & "$NDK_OBJCOPY" --add-gnu-debuglink=src/libharfbuzz.so.debug src/libharfbuzz.so
          & "$NDK_OBJCOPY" --only-keep-debug src/libharfbuzz-subset.so src/libharfbuzz-subset.so.debug
          & "$NDK_STRIP" --strip-debug src/libharfbuzz-subset.so
          & "$NDK_OBJCOPY" --add-gnu-debuglink=src/libharfbuzz-subset.so.debug src/libharfbuzz-subset.so
          & "$NDK_OBJCOPY" --only-keep-debug src/libharfbuzz-raster.so src/libharfbuzz-raster.so.debug
          & "$NDK_STRIP" --strip-debug src/libharfbuzz-raster.so
          & "$NDK_OBJCOPY" --add-gnu-debuglink=src/libharfbuzz-raster.so.debug src/libharfbuzz-raster.so
          & "$NDK_OBJCOPY" --only-keep-debug src/libharfbuzz-vector.so src/libharfbuzz-vector.so.debug
          & "$NDK_STRIP" --strip-debug src/libharfbuzz-vector.so
          & "$NDK_OBJCOPY" --add-gnu-debuglink=src/libharfbuzz-vector.so.debug src/libharfbuzz-vector.so
          cd ../..
      - name: Upload Android x86_64 artifacts
        uses: actions/upload-artifact@v6
        with:
          name: android-x86_64-artifacts
          path: |
            ./harfbuzz/build_android_x86_64/src/*.so
            ./harfbuzz/build_android_x86_64/src/*.so.debug
            ./libpng/install_android_x86_64/lib/*.a
            ./zlib/install_android_x86_64/lib/*.a

  osx:
    runs-on: macos-14
    steps:
      - name: Git checkout
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Setup meson
        run: python -m pip install meson ninja
      - name: Build libpng and zlib for all targets
        run: |
          git clone --depth 1 https://github.com/glennrp/libpng.git libpng
          git clone --depth 1 https://github.com/madler/zlib.git zlib

          # macOS arm64
          cmake -S libpng -B libpng/build_macos_arm64 \
            -G "Ninja" \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_BUILD_TYPE=MinSizeRel \
            -DCMAKE_INSTALL_PREFIX=libpng/install_macos_arm64 \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DPNG_SHARED=OFF -DPNG_TESTS=OFF
          cmake --build libpng/build_macos_arm64
          cmake --install libpng/build_macos_arm64
          cmake -S zlib -B zlib/build_macos_arm64 \
            -G "Ninja" \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_BUILD_TYPE=MinSizeRel \
            -DCMAKE_INSTALL_PREFIX=zlib/install_macos_arm64 \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DBUILD_SHARED_LIBS=OFF
          cmake --build zlib/build_macos_arm64
          cmake --install zlib/build_macos_arm64

          # macOS x86_64
          cmake -S libpng -B libpng/build_macos_x86_64 \
            -G "Ninja" \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DCMAKE_BUILD_TYPE=MinSizeRel \
            -DCMAKE_INSTALL_PREFIX=libpng/install_macos_x86_64 \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DPNG_SHARED=OFF -DPNG_TESTS=OFF
          cmake --build libpng/build_macos_x86_64
          cmake --install libpng/build_macos_x86_64
          cmake -S zlib -B zlib/build_macos_x86_64 \
            -G "Ninja" \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DCMAKE_BUILD_TYPE=MinSizeRel \
            -DCMAKE_INSTALL_PREFIX=zlib/install_macos_x86_64 \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DBUILD_SHARED_LIBS=OFF
          cmake --build zlib/build_macos_x86_64
          cmake --install zlib/build_macos_x86_64

          # iOS device
          cmake -S libpng -B libpng/build_ios_device \
            -G "Ninja" \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
            -DCMAKE_BUILD_TYPE=MinSizeRel \
            -DCMAKE_INSTALL_PREFIX=libpng/install_ios_device \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DPNG_SHARED=OFF -DPNG_TESTS=OFF
          cmake --build libpng/build_ios_device
          cmake --install libpng/build_ios_device
          cmake -S zlib -B zlib/build_ios_device \
            -G "Ninja" \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
            -DCMAKE_BUILD_TYPE=MinSizeRel \
            -DCMAKE_INSTALL_PREFIX=zlib/install_ios_device \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DBUILD_SHARED_LIBS=OFF
          cmake --build zlib/build_ios_device
          cmake --install zlib/build_ios_device

          # iOS simulator
          cmake -S libpng -B libpng/build_ios_simulator \
            -G "Ninja" \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DCMAKE_OSX_SYSROOT=iphonesimulator \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
            -DCMAKE_BUILD_TYPE=MinSizeRel \
            -DCMAKE_INSTALL_PREFIX=libpng/install_ios_simulator \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DPNG_SHARED=OFF -DPNG_TESTS=OFF
          cmake --build libpng/build_ios_simulator
          cmake --install libpng/build_ios_simulator
          cmake -S zlib -B zlib/build_ios_simulator \
            -G "Ninja" \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DCMAKE_OSX_SYSROOT=iphonesimulator \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
            -DCMAKE_BUILD_TYPE=MinSizeRel \
            -DCMAKE_INSTALL_PREFIX=zlib/install_ios_simulator \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DBUILD_SHARED_LIBS=OFF
          cmake --build zlib/build_ios_simulator
          cmake --install zlib/build_ios_simulator

      - name: Build macOS x86_64
        run: |
          cd harfbuzz
          meson setup build_x86_64 \
            --cross-file ../macos_x86_64_crossfile_device.txt \
            --buildtype=minsize \
            --pkg-config-path=../libpng/install_macos_x86_64/lib/pkgconfig:../zlib/install_macos_x86_64/lib/pkgconfig \
            -Dtests=disabled -Dutilities=disabled -Db_lto=true \
            -Dfreetype=disabled -Dglib=disabled -Dcairo=disabled \
            -Dicu=disabled -Dgobject=disabled -Dchafa=disabled
          meson compile -C build_x86_64
          cd ..
      - name: Build macOS arm64
        run: |
          cd harfbuzz
          meson setup build_arm64 \
            --buildtype=minsize \
            --pkg-config-path=../libpng/install_macos_arm64/lib/pkgconfig:../zlib/install_macos_arm64/lib/pkgconfig \
            -Dtests=disabled -Dutilities=disabled -Db_lto=true \
            -Dfreetype=disabled -Dglib=disabled -Dcairo=disabled \
            -Dicu=disabled -Dgobject=disabled -Dchafa=disabled
          meson compile -C build_arm64
          cd ..
      - name: Create macOS universal binary
        run: |
          cd harfbuzz
          mkdir -p build/src
          echo "*" >> build/.gitignore
          lipo -create build_x86_64/src/libharfbuzz.0.dylib build_arm64/src/libharfbuzz.0.dylib -output build/src/libharfbuzz.0.dylib
          lipo -create build_x86_64/src/libharfbuzz-subset.0.dylib build_arm64/src/libharfbuzz-subset.0.dylib -output build/src/libharfbuzz-subset.0.dylib
          lipo -create build_x86_64/src/libharfbuzz-raster.0.dylib build_arm64/src/libharfbuzz-raster.0.dylib -output build/src/libharfbuzz-raster.0.dylib
          lipo -create build_x86_64/src/libharfbuzz-vector.0.dylib build_arm64/src/libharfbuzz-vector.0.dylib -output build/src/libharfbuzz-vector.0.dylib
          cp build/src/libharfbuzz.0.dylib build/src/libharfbuzz.dylib
          cp build/src/libharfbuzz-subset.0.dylib build/src/libharfbuzz-subset.dylib
          cp build/src/libharfbuzz-raster.0.dylib build/src/libharfbuzz-raster.dylib
          cp build/src/libharfbuzz-vector.0.dylib build/src/libharfbuzz-vector.dylib
          cd ..
      - name: Build iOS device
        run: |
          cd harfbuzz
          meson setup build_ios_device \
            --cross-file ../ios_crossfile_device.txt \
            --buildtype=minsize \
            --pkg-config-path=../libpng/install_ios_device/lib/pkgconfig:../zlib/install_ios_device/lib/pkgconfig \
            -Dtests=disabled -Dutilities=disabled -Db_lto=true \
            -Dfreetype=disabled -Dglib=disabled -Dcairo=disabled \
            -Dicu=disabled -Dgobject=disabled -Dchafa=disabled
          meson compile -C build_ios_device
          cd ..
      - name: Build iOS simulator
        run: |
          cd harfbuzz
          meson setup build_ios_simulator \
            --cross-file ../ios_crossfile_simulator.txt \
            --buildtype=minsize \
            --pkg-config-path=../libpng/install_ios_simulator/lib/pkgconfig:../zlib/install_ios_simulator/lib/pkgconfig \
            -Dtests=disabled -Dutilities=disabled -Db_lto=true \
            -Dfreetype=disabled -Dglib=disabled -Dcairo=disabled \
            -Dicu=disabled -Dgobject=disabled -Dchafa=disabled
          meson compile -C build_ios_simulator
          cd ..
      - name: Upload osx artifacts
        uses: actions/upload-artifact@v6
        with:
          name: osx-artifacts
          path: |
            ./harfbuzz/build/src/*.dylib
      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v6
        with:
          name: iOS-artifacts
          path: |
            ./harfbuzz/build_ios_device/src/*.a
            ./harfbuzz/build_ios_simulator/src/*.a