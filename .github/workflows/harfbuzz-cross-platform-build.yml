name: harfbuzz-cross-platform-build

on:
  push:
    branches:
      - '**'
    paths-ignore:
      - docs/**
      - '**/*.md'

jobs:
  linux:
    runs-on: ubuntu-24.04

    steps:
      - name: Git checkout
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Meson and Ninja
        run: python -m pip install meson ninja

      - name: Cache Meson subprojects
        uses: actions/cache@v5
        with:
          path: harfbuzz/subprojects/packagecache
          key: meson-wraps-linux

      - name: Build Linux x86_64
        run: |
          cd harfbuzz
          meson setup build \
            --buildtype=minsize \
            --wrap-mode=forcefallback \
            -Dtests=disabled \
            -Dutilities=disabled \
            -Db_lto=true \
            -Dfreetype=disabled \
            -Dglib=disabled \
            -Dcairo=disabled \
            -Dicu=disabled \
            -Dgobject=disabled \
            -Dchafa=disabled \
            -Ddefault_library=shared \
            -Dc_link_args='-static-libgcc' \
            -Dcpp_link_args='-static-libgcc -static-libstdc++'
          meson compile -C build
          # create debug symbols and strip
          for lib in libharfbuzz.so libharfbuzz-subset.so libharfbuzz-raster.so libharfbuzz-vector.so; do
            objcopy --only-keep-debug build/src/$lib build/src/$lib.debug
            strip --strip-debug build/src/$lib
            objcopy --add-gnu-debuglink=build/src/$lib.debug build/src/$lib
          done
          cd ..

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v6
        with:
          name: linux-artifacts
          path: |
            ./harfbuzz/build/src/*.so
            ./harfbuzz/build/src/*.so.debug

  android:
    runs-on: ubuntu-24.04

    steps:
      - name: Git checkout
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Set up NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27d

      - name: Install Meson and Ninja
        run: python -m pip install meson ninja

      - name: Set NDK_BIN
        run: echo "NDK_BIN=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_ENV

      - name: Generate Android Cross Files
        run: |
          # Use the NDK_BIN value from the environment
          envsubst < android_arm64_crossfile_device.txt.template > android_arm64_crossfile_device.txt
          envsubst < android_arm32_crossfile_device.txt.template > android_arm32_crossfile_device.txt

      - name: Cache Meson subprojects
        uses: actions/cache@v5
        with:
          path: harfbuzz/subprojects/packagecache
          key: meson-wraps-${{ runner.os }}-android-arm

      - name: Build Android ARM64
        run: |
          cd harfbuzz
          meson setup build_android_arm64 \
            --cross-file ../android_arm64_crossfile_device.txt \
            --buildtype=minsize \
            --wrap-mode=forcefallback \
            -Dtests=disabled \
            -Dutilities=disabled \
            -Db_lto=true \
            -Dfreetype=disabled \
            -Dglib=disabled \
            -Dcairo=disabled \
            -Dicu=disabled \
            -Dgobject=disabled \
            -Dchafa=disabled
          meson compile -C build_android_arm64
          cd build_android_arm64
          for lib in libharfbuzz.so libharfbuzz-subset.so libharfbuzz-raster.so libharfbuzz-vector.so; do
            "$NDK_BIN/llvm-objcopy" --only-keep-debug src/$lib src/$lib.debug
            "$NDK_BIN/llvm-strip" --strip-debug src/$lib
            "$NDK_BIN/llvm-objcopy" --add-gnu-debuglink=src/$lib.debug src/$lib
          done
          cd ../..

      - name: Build Android ARM32
        run: |
          cd harfbuzz
          meson setup build_android_arm32 \
            --cross-file ../android_arm32_crossfile_device.txt \
            --buildtype=minsize \
            --wrap-mode=forcefallback \
            -Dtests=disabled \
            -Dutilities=disabled \
            -Db_lto=true \
            -Dfreetype=disabled \
            -Dglib=disabled \
            -Dcairo=disabled \
            -Dicu=disabled \
            -Dgobject=disabled \
            -Dchafa=disabled
          meson compile -C build_android_arm32
          cd build_android_arm32
          for lib in libharfbuzz.so libharfbuzz-subset.so libharfbuzz-raster.so libharfbuzz-vector.so; do
            "$NDK_BIN/llvm-objcopy" --only-keep-debug src/$lib src/$lib.debug
            "$NDK_BIN/llvm-strip" --strip-debug src/$lib
            "$NDK_BIN/llvm-objcopy" --add-gnu-debuglink=src/$lib.debug src/$lib
          done
          cd ../..

      - name: Upload Android ARM64 artifacts
        uses: actions/upload-artifact@v6
        with:
          name: android-arm64-artifacts
          path: |
            ./harfbuzz/build_android_arm64/src/*.so
            ./harfbuzz/build_android_arm64/src/*.so.debug

      - name: Upload Android ARM32 artifacts
        uses: actions/upload-artifact@v6
        with:
          name: android-arm32-artifacts
          path: |
            ./harfbuzz/build_android_arm32/src/*.so
            ./harfbuzz/build_android_arm32/src/*.so.debug

  windows:
    runs-on: windows-2025

    steps:
      - name: Git checkout
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Meson and Ninja
        run: python -m pip install meson ninja

      - name: Cache Meson subprojects
        uses: actions/cache@v5
        with:
          path: harfbuzz/subprojects/packagecache
          key: meson-wraps-windows

      - name: Build Windows x86_64
        run: |
          cd harfbuzz
          meson setup build `
            --vsenv `
            --buildtype=minsize `
            --wrap-mode=forcefallback `
            -Dtests=disabled `
            -Dutilities=disabled `
            -Db_lto=true `
            -Dfreetype=disabled `
            -Dglib=disabled `
            -Dcairo=disabled `
            -Dicu=disabled `
            -Dgobject=disabled `
            -Dchafa=disabled
          meson compile -C build
          cd ..

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v6
        with:
          name: windows-artifacts
          path: |
            ./harfbuzz/build/src/*.dll
            ./harfbuzz/build/src/*.pdb
            ./harfbuzz/build/src/*.lib
            ./harfbuzz/build/subprojects/**/*.dll

  android-x86_64:
    runs-on: windows-2025

    steps:
      - name: Git checkout
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Set up NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27d

      - name: Setup Meson and Ninja
        run: python -m pip install meson ninja

      # Cache Meson wrap downloads (critical for CI speed)
      - name: Cache Meson subprojects
        uses: actions/cache@v5
        with:
          path: harfbuzz/subprojects/packagecache
          key: meson-wraps-${{ runner.os }}-android-x86_64

      - name: Generate Android Cross File
        run: |
          # Path to the NDK bin folder on this runner
          $ndkBin = Join-Path -Path $env:ANDROID_NDK_ROOT -ChildPath "toolchains/llvm/prebuilt/windows-x86_64/bin"

          # Read the template, replace the placeholder with the real path
          $template = Get-Content android_x86_64_crossfile_device.txt.template
          $crossfile = $template -replace '\$\{NDK_BIN\}', $ndkBin

          # Save the generated cross file for Meson
          $crossfile | Set-Content android_x86_64_crossfile_device.txt

      - name: Verify generated cross file
        run: Get-Content android_x86_64_crossfile_device.txt
        
      # Configure + build with debug logging
      - name: Build Android x86_64 with Harfbuzz (wraps + debug)
        run: |
          cd harfbuzz

          meson setup build_android_x86_64 `
            --cross-file ../android_x86_64_crossfile_device.txt `
            --buildtype=minsize `
            --wrap-mode=forcefallback `
            -Dtests=disabled `
            -Dutilities=disabled `
            -Db_lto=true `
            -Dfreetype=disabled `
            -Dglib=disabled `
            -Dcairo=disabled `
            -Dicu=disabled `
            -Dgobject=disabled `
            -Dchafa=disabled

          meson compile -C build_android_x86_64        

          cd build_android_x86_64

          $NDK_BIN = Join-Path -Path $env:ANDROID_NDK_ROOT -ChildPath "toolchains/llvm/prebuilt/windows-x86_64/bin"
          $NDK_OBJCOPY = Join-Path -Path $NDK_BIN -ChildPath "llvm-objcopy.exe"
          $NDK_STRIP = Join-Path -Path $NDK_BIN -ChildPath "llvm-strip.exe"

          foreach ($lib in @("libharfbuzz.so", "libharfbuzz-subset.so", "libharfbuzz-raster.so", "libharfbuzz-vector.so")) {
              if (Test-Path "src/$lib") {
                  & "$NDK_OBJCOPY" --only-keep-debug "src/$lib" "src/$lib.debug"
                  & "$NDK_STRIP" --strip-debug "src/$lib"
                  & "$NDK_OBJCOPY" --add-gnu-debuglink="src/$lib.debug" "src/$lib"
              } else {
                  Write-Host "Skipping missing $lib"
              }
          }

          cd ../..

      - name: Upload Android x86_64 artifacts
        uses: actions/upload-artifact@v6
        with:
          name: android-x86_64-artifacts
          path: |
            ./harfbuzz/build_android_x86_64/src/*.so
            ./harfbuzz/build_android_x86_64/src/*.so.debug

  osx_ios:
    runs-on: macos-14
    steps:
      - name: Git checkout
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Setup Meson & Ninja
        run: python -m pip install meson ninja

      - name: Generate cross files
        run: |
          cp ios_crossfile_device.txt.template ios_crossfile_device.txt
          cp ios_crossfile_simulator.txt.template ios_crossfile_simulator.txt
          cp macos_x86_64_crossfile_device.txt.template macos_x86_64_crossfile_device.txt

      - name: Build Harfbuzz macOS x86_64
        run: |
          cd harfbuzz
          meson setup build_x86_64 \
            --cross-file ../macos_x86_64_crossfile_device.txt \
            --wrap-mode=forcefallback \
            --buildtype=minsize \
            -Dtests=disabled \
            -Dutilities=disabled \
            -Db_lto=true \
            -Dfreetype=disabled \
            -Dglib=disabled \
            -Dcairo=disabled \
            -Dicu=disabled \
            -Dgobject=disabled \
            -Dchafa=disabled
          meson compile -C build_x86_64
          cd ..

      - name: Build Harfbuzz macOS arm64
        run: |
          cd harfbuzz
          meson setup build_arm64 \
            --buildtype=minsize \
            --wrap-mode=forcefallback \
            -Dtests=disabled \
            -Dutilities=disabled \
            -Db_lto=true \
            -Dfreetype=disabled \
            -Dglib=disabled \
            -Dcairo=disabled \
            -Dicu=disabled \
            -Dgobject=disabled \
            -Dchafa=disabled
          meson compile -C build_arm64
          cd ..

      - name: Create macOS universal binaries
        run: |
          cd harfbuzz
          mkdir -p build/src
          lipo -create build_x86_64/src/libharfbuzz.0.dylib build_arm64/src/libharfbuzz.0.dylib -output build/src/libharfbuzz.0.dylib
          lipo -create build_x86_64/src/libharfbuzz-subset.0.dylib build_arm64/src/libharfbuzz-subset.0.dylib -output build/src/libharfbuzz-subset.0.dylib
          lipo -create build_x86_64/src/libharfbuzz-raster.0.dylib build_arm64/src/libharfbuzz-raster.0.dylib -output build/src/libharfbuzz-raster.0.dylib
          lipo -create build_x86_64/src/libharfbuzz-vector.0.dylib build_arm64/src/libharfbuzz-vector.0.dylib -output build/src/libharfbuzz-vector.0.dylib
          cp build/src/libharfbuzz.0.dylib build/src/libharfbuzz.dylib
          cp build/src/libharfbuzz-subset.0.dylib build/src/libharfbuzz-subset.dylib
          cp build/src/libharfbuzz-raster.0.dylib build/src/libharfbuzz-raster.dylib
          cp build/src/libharfbuzz-vector.0.dylib build/src/libharfbuzz-vector.dylib
          cd ..

      - name: Build Harfbuzz iOS device
        run: |
          cd harfbuzz
          meson setup build_ios_device \
            --cross-file ../ios_crossfile_device.txt \
            --wrap-mode=forcefallback \
            --buildtype=minsize \
            -Dtests=disabled \
            -Dutilities=disabled \
            -Db_lto=true \
            -Dfreetype=disabled \
            -Dglib=disabled \
            -Dcairo=disabled \
            -Dicu=disabled \
            -Dgobject=disabled \
            -Dchafa=disabled
          meson compile -C build_ios_device
          cd ..

      - name: Build Harfbuzz iOS simulator
        run: |
          cd harfbuzz
          meson setup build_ios_simulator \
            --cross-file ../ios_crossfile_simulator.txt \
            --wrap-mode=forcefallback \
            --buildtype=minsize \
            -Dtests=disabled \
            -Dutilities=disabled \
            -Db_lto=true \
            -Dfreetype=disabled \
            -Dglib=disabled \
            -Dcairo=disabled \
            -Dicu=disabled \
            -Dgobject=disabled \
            -Dchafa=disabled
          meson compile -C build_ios_simulator
          cd ..

      - name: Upload macOS universal binaries
        uses: actions/upload-artifact@v6
        with:
          name: osx-artifacts
          path: ./harfbuzz/build/src/*.dylib

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v6
        with:
          name: iOS-artifacts
          path: |
            ./harfbuzz/build_ios_device/src/*.a
            ./harfbuzz/build_ios_simulator/src/*.a